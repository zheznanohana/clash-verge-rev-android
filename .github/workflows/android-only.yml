name: Android APK Only

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: |
          pnpm install
          cargo install cargo-ndk --force

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          pnpm tauri android init || true
          pnpm tauri android build --apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clash-verge-rev-android
          path: '**/*.apk'
          retention-days: 14
